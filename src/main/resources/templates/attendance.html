<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Face Recognition Attendance</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <!-- Attendance CSS -->
    <link rel="stylesheet"
          th:href="@{/css/attendance.css}">

</head>

<body>

<div class="container-fluid py-4">

    <!-- Header -->

    <div class="page-header text-center mb-4">

        <h1 class="fw-bold">

            <i class="bi bi-camera-video-fill text-primary"></i>

            Smart Face Recognition Attendance Terminal

        </h1>

        <p class="text-secondary mb-0">

            Stand in front of the camera. Attendance will be marked automatically.

        </p>

    </div>

    <!-- Main Content -->

    <div class="row g-4">

        <!-- Camera -->

        <div class="col-lg-8">

            <div class="card attendance-card">

                <div class="card-header">

                    <h5 class="mb-0">

                        <i class="bi bi-camera-fill"></i>

                        Camera

                    </h5>

                </div>

                <div class="card-body text-center">

                    <video
                            id="video"
                            autoplay
                            muted
                            playsinline
                            class="camera-frame">
                    </video>

                    <canvas
                            id="canvas"
                            style="display:none;">
                    </canvas>

                </div>

            </div>

        </div>

        <!-- Student Information -->

        <div class="col-lg-4">

            <div class="card attendance-card">

                <div class="card-header">

                    <h5 class="mb-0">

                        <i class="bi bi-person-badge-fill"></i>

                        Student Information

                    </h5>

                </div>

                <div class="card-body text-center">

                    <img
                            id="studentPhoto"
                            src="https://via.placeholder.com/180"
                            class="student-photo"
                            alt="Student">

                    <h3
                            id="studentName"
                            class="mt-3">

                        Waiting...

                    </h3>

                    <p
                            id="studentUSN"
                            class="text-muted">

                        ----

                    </p>

                    <div class="student-details mt-4">

                        <div class="detail-item mb-3">

                            <i class="bi bi-building"></i>

                            <span id="studentDepartment">

                                Department

                            </span>

                        </div>

                        <div class="detail-item">

                            <i class="bi bi-mortarboard-fill"></i>

                            <span id="studentSemester">

                                Semester

                            </span>

                        </div>

                    </div>

                    <div
                            id="attendanceStatus"
                            class="alert alert-warning mt-4">

                        Waiting for Face...

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<script th:src="@{/js/attendance.js}"></script>

</body>

</html>
