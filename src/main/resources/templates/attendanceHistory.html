<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Attendance History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container-fluid py-4">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold text-primary">

                <i class="bi bi-calendar-check-fill"></i>

                Attendance History

            </h2>

            <p class="text-muted">

                View and manage attendance records

            </p>

        </div>

        <div class="d-flex gap-2">

            <a href="/dashboard" class="btn btn-secondary">

                <i class="bi bi-speedometer2"></i>

                Dashboard

            </a>

            <a href="/attendance" class="btn btn-warning">

                <i class="bi bi-camera-video-fill"></i>

                Live Attendance

            </a>

        </div>

    </div>

    <!-- Search & Export -->

    <div class="card shadow-sm mb-4">

        <div class="card-body">

            <div class="row">

                <div class="col-md-5">

                    <input
                            type="text"
                            id="searchInput"
                            class="form-control"
                            placeholder="Search by Name, USN or Department">

                </div>

                <div class="col-md-7 text-end">

                    <a href="/attendance/export/csv"
                       class="btn btn-primary">

                        <i class="bi bi-filetype-csv"></i>

                        Export CSV

                    </a>

                    <a href="/attendance/export/excel"
                       class="btn btn-success">

                        <i class="bi bi-file-earmark-excel-fill"></i>

                        Export Excel

                    </a>

                    <a href="/attendance/export/pdf"
                       class="btn btn-danger">

                        <i class="bi bi-file-earmark-pdf-fill"></i>

                        Export PDF

                    </a>

                </div>

            </div>

        </div>

    </div>

    <!-- Attendance Table -->

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h5 class="mb-0">

                Attendance Records

            </h5>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover table-bordered align-middle"
                       id="attendanceTable">

                    <thead class="table-dark">

                    <tr>

                        <th>#</th>

                        <th>Name</th>

                        <th>USN</th>

                        <th>Department</th>

                        <th>Date</th>

                        <th>Time</th>

                        <th>Status</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:if="${#lists.isEmpty(attendanceList)}">

                        <td colspan="7"
                            class="text-center">

                            No Attendance Records Found

                        </td>

                    </tr>

                    <tr th:each="attendance, stat : ${attendanceList}">

                        <td th:text="${stat.count}"></td>

                        <td th:text="${attendance.student.name}"></td>

                        <td th:text="${attendance.student.usn}"></td>

                        <td th:text="${attendance.student.department}"></td>

                        <td th:text="${attendance.attendanceDate}"></td>

                        <td th:text="${attendance.attendanceTime}"></td>

                        <td>

                            <span class="badge bg-success"
                                  th:text="${attendance.status}">

                            </span>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>

    const searchInput = document.getElementById("searchInput");

    searchInput.addEventListener("keyup", function(){

        let value = this.value.toLowerCase();

        document.querySelectorAll("#attendanceTable tbody tr").forEach(row=>{

            row.style.display =
                row.innerText.toLowerCase().includes(value)
                    ? ""
                    : "none";

        });

    });

</script>

</body>

</html>
