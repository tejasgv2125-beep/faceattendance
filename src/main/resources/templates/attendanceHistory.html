<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Attendance History</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Shared Sidebar -->
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <!-- Attendance History CSS -->
    <link rel="stylesheet" th:href="@{/css/attendanceHistory.css}">

</head>

<body>

<div class="dashboard-layout">

    <!-- Sidebar -->

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Main Content -->

    <main class="main-content">

        <!-- Header -->

        <div class="page-header mb-4">

            <div class="d-flex justify-content-between align-items-center">

                <div>

                    <h2 class="fw-bold text-white">

                        <i class="bi bi-clock-history text-primary"></i>

                        Attendance History

                    </h2>

                    <p class="text-secondary mb-0">

                        View and manage all attendance records

                    </p>

                </div>

            </div>

        </div>

        <!-- Summary Cards -->

        <div class="row g-4 mb-4">

            <div class="col-md-4">

                <div class="card stat-card bg-primary text-white">

                    <div class="card-body">

                        <div class="d-flex justify-content-between">

                            <div>

                                <h5>Total Records</h5>

                                <h2 th:text="${attendanceList.size()}">0</h2>

                            </div>

                            <i class="bi bi-database-fill fs-1"></i>

                        </div>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card stat-card bg-success text-white">

                    <div class="card-body">

                        <div class="d-flex justify-content-between">

                            <div>

                                <h5>Present</h5>

                                <h2 th:text="${attendanceList.size()}">0</h2>

                            </div>

                            <i class="bi bi-check-circle-fill fs-1"></i>

                        </div>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card stat-card bg-warning text-dark">

                    <div class="card-body">

                        <div class="d-flex justify-content-between">

                            <div>

                                <h5>Today's Attendance</h5>

                                <h2 th:text="${attendanceList.size()}">0</h2>

                            </div>

                            <i class="bi bi-calendar-check-fill fs-1"></i>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- Search + Export -->

        <div class="card shadow-lg border-0 mb-4">

            <div class="card-body">

                <div class="row g-3 align-items-center">

                    <div class="col-lg-5">

                        <div class="input-group">

                            <span class="input-group-text">

                                <i class="bi bi-search"></i>

                            </span>

                            <input

                                    type="text"

                                    id="searchInput"

                                    class="form-control"

                                    placeholder="Search by Name, USN or Department">

                        </div>

                    </div>

                    <div class="col-lg-7 text-end">

                        <a href="/attendance/export/csv"

                           class="btn btn-primary">

                            <i class="bi bi-filetype-csv"></i>

                            CSV

                        </a>

                        <a href="/attendance/export/excel"

                           class="btn btn-success">

                            <i class="bi bi-file-earmark-excel-fill"></i>

                            Excel

                        </a>

                        <a href="/attendance/export/pdf"

                           class="btn btn-danger">

                            <i class="bi bi-file-earmark-pdf-fill"></i>

                            PDF

                        </a>

                    </div>

                </div>

            </div>

        </div>

        <!-- Attendance Table -->

        <div class="card shadow-lg border-0">

            <div class="card-header bg-primary text-white">

                <h5 class="mb-0">

                    <i class="bi bi-table"></i>

                    Attendance Records

                </h5>

            </div>

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-hover align-middle mb-0"
                           id="attendanceTable">

                        <thead class="table-dark">

                        <tr>

                            <th>#</th>
                            <th>Name</th>
                            <th>USN</th>
                            <th>Department</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Status</th>

                        </tr>

                        </thead>

                        <tbody>
                        <tr th:if="${#lists.isEmpty(attendanceList)}">

                            <td colspan="7" class="text-center py-5">

                                <i class="bi bi-database-x fs-1 text-secondary"></i>

                                <br><br>

                                <h5>No Attendance Records Found</h5>

                            </td>

                        </tr>

                        <tr th:each="attendance, stat : ${attendanceList}">

                            <td th:text="${stat.count}"></td>

                            <td>

                                <div class="d-flex align-items-center">

                                    <div class="student-avatar">

                                        <i class="bi bi-person-fill"></i>

                                    </div>

                                    <span class="ms-3"
                                          th:text="${attendance.student.name}">
                                    </span>

                                </div>

                            </td>

                            <td th:text="${attendance.student.usn}"></td>

                            <td>

                                <span class="badge bg-info"
                                      th:text="${attendance.student.department}">
                                </span>

                            </td>

                            <td th:text="${attendance.attendanceDate}"></td>

                            <td th:text="${attendance.attendanceTime}"></td>

                            <td>

                                <span class="badge bg-success px-3 py-2"
                                      th:text="${attendance.status}">
                                </span>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </main>

</div>

<script>

    const searchInput = document.getElementById("searchInput");

    searchInput.addEventListener("keyup", function(){

        let value = this.value.toLowerCase();

        document.querySelectorAll("#attendanceTable tbody tr").forEach(row=>{

            row.style.display =
                row.innerText.toLowerCase().includes(value)
                    ? ""
                    : "none";

        });

    });

</script>

</body>

</html>
