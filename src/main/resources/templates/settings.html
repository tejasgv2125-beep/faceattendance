<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Settings</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <!-- Sidebar -->

    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <!-- Settings CSS -->

    <link rel="stylesheet" th:href="@{/css/settings.css}">

</head>

<body>

<div class="dashboard-layout">

    <!-- Sidebar -->

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Main Content -->

    <main class="main-content">

        <!-- ================= HEADER ================= -->

        <div class="page-header mb-4">

            <div>

                <h2>

                    <i class="bi bi-gear-fill text-primary"></i>

                    Admin Settings

                </h2>

                <p>

                    Manage your profile, password and application settings

                </p>

            </div>

        </div>

        <!-- ================= Alerts ================= -->

        <div th:if="${param.success}"
             class="alert alert-success">

            <i class="bi bi-check-circle-fill"></i>

            Profile updated successfully.

        </div>

        <div th:if="${param.passwordChanged}"
             class="alert alert-success">

            <i class="bi bi-check-circle-fill"></i>

            Password changed successfully.

        </div>

        <div th:if="${param.invalidPassword}"
             class="alert alert-danger">

            <i class="bi bi-x-circle-fill"></i>

            Current password is incorrect.

        </div>

        <div th:if="${param.passwordMismatch}"
             class="alert alert-warning">

            <i class="bi bi-exclamation-triangle-fill"></i>

            Passwords do not match.

        </div>

        <!-- ================= Cards ================= -->

        <div class="row g-4">

            <!-- Profile -->

            <div class="col-lg-6">

                <div class="card settings-card">

                    <div class="card-header">

                        <h5>

                            <i class="bi bi-person-circle"></i>

                            Admin Profile

                        </h5>

                    </div>

                    <div class="card-body">

                        <form
                                action="/settings/update-profile"
                                method="post">

                            <div class="mb-3">

                                <label class="form-label">

                                    Full Name

                                </label>

                                <input

                                        type="text"

                                        class="form-control"

                                        name="name"

                                        th:value="${admin.name}"

                                        required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    Username

                                </label>

                                <input

                                        type="text"

                                        class="form-control"

                                        th:value="${admin.username}"

                                        readonly>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">

                                    Email

                                </label>

                                <input

                                        type="email"

                                        class="form-control"

                                        name="email"

                                        th:value="${admin.email}"

                                        required>

                            </div>

                            <button
                                    class="btn btn-primary btn-lg">

                                <i class="bi bi-save-fill"></i>

                                Update Profile

                            </button>
                        </form>

                    </div>

                </div>

            </div>

            <!-- ================= Change Password ================= -->

            <div class="col-lg-6">

                <div class="card settings-card">

                    <div class="card-header danger-header">

                        <h5>

                            <i class="bi bi-shield-lock-fill"></i>

                            Change Password

                        </h5>

                    </div>

                    <div class="card-body">

                        <form
                                action="/settings/change-password"
                                method="post">

                            <div class="mb-3">

                                <label class="form-label">

                                    Current Password

                                </label>

                                <input
                                        type="password"
                                        class="form-control"
                                        name="currentPassword"
                                        required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    New Password

                                </label>

                                <input
                                        type="password"
                                        class="form-control"
                                        name="newPassword"
                                        required>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">

                                    Confirm Password

                                </label>

                                <input
                                        type="password"
                                        class="form-control"
                                        name="confirmPassword"
                                        required>

                            </div>

                            <button
                                    class="btn btn-danger btn-lg">

                                <i class="bi bi-key-fill"></i>

                                Update Password

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>





    </main>

</div>

<script>

    setTimeout(function(){

        document.querySelectorAll(".alert").forEach(function(alert){

            alert.style.transition="0.5s";
            alert.style.opacity="0";

            setTimeout(function(){

                alert.remove();

            },500);

        });

    },3000);

</script>

</body>

</html>
