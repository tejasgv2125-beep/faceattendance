<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Smart Face Recognition Attendance</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet"
          th:href="@{/css/dashboard.css}">

</head>

<body style="background:#0f172a;color:white;">

<div class="dashboard-layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Main Content -->
    <main class="main-content">

    <!-- ================= Header ================= -->

    <div class="dashboard-header mb-4">

        <div class="d-flex justify-content-between align-items-center flex-wrap">

            <div>

                <h2 class="fw-bold mb-1">
                    🤖 Smart Face Recognition Attendance
                </h2>

                <p class="mb-0 text-white">

                    Welcome back,

                    <strong th:text="${admin.name}">Administrator</strong>

                    👋

                </p>

            </div>

            <div class="text-end">

                <div class="badge bg-primary px-3 py-2 fs-6 mb-2">
                    <i class="bi bi-calendar-event"></i>
                    <span id="liveDate"></span>
                </div>

                <br>

                <div class="badge bg-success px-3 py-2 fs-5">
                    <i class="bi bi-clock-history"></i>
                    <span id="liveClock"></span>
                </div>

            </div>

        </div>

    </div>



    <!-- Statistics -->

    <div class="row g-4 mb-4">

        <div class="col-lg-2 col-md-4">

            <div class="card bg-dark text-white shadow">

                <div class="card-body text-center">

                    <i class="bi bi-people-fill fs-1 text-primary"></i>

                    <h2 th:text="${totalStudents}">0</h2>

                    <p>Total Students</p>

                </div>

            </div>

        </div>

        <div class="col-lg-2 col-md-4">

            <div class="card bg-dark text-white shadow">

                <div class="card-body text-center">

                    <i class="bi bi-person-check-fill fs-1 text-success"></i>

                    <h2 th:text="${registeredFaces}">0</h2>

                    <p>Registered Faces</p>

                </div>

            </div>

        </div>

        <div class="col-lg-2 col-md-4">

            <div class="card bg-dark text-white shadow">

                <div class="card-body text-center">

                    <i class="bi bi-person-x-fill fs-1 text-danger"></i>

                    <h2 th:text="${pendingFaces}">0</h2>

                    <p>Pending Faces</p>

                </div>

            </div>

        </div>

        <div class="col-lg-2 col-md-4">

            <div class="card bg-dark text-white shadow">

                <div class="card-body text-center">

                    <i class="bi bi-check-circle-fill fs-1 text-success"></i>

                    <h2 th:text="${presentToday}">0</h2>

                    <p>Present Today</p>

                </div>

            </div>

        </div>

        <div class="col-lg-2 col-md-4">

            <div class="card bg-dark text-white shadow">

                <div class="card-body text-center">

                    <i class="bi bi-person-dash-fill fs-1 text-danger"></i>

                    <h2 th:text="${absentToday}">0</h2>

                    <p>Absent Today</p>

                </div>

            </div>

        </div>

        <div class="col-lg-2 col-md-4">

            <div class="card bg-dark text-white shadow">

                <div class="card-body text-center">

                    <i class="bi bi-graph-up-arrow fs-1 text-warning"></i>

                    <h2 th:text="${attendancePercentage + '%'}">0%</h2>

                    <p>Attendance %</p>

                </div>

            </div>

        </div>

    </div>

    <!-- Analytics -->

    <div class="row">

        <!-- Present vs Absent -->

        <div class="col-lg-6 mb-4">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h5 class="mb-0">

                        Present vs Absent

                    </h5>

                </div>

                <div class="card-body">

                    <div style="height:300px; width:300px; margin:auto;">
                        <canvas id="pieChart"></canvas>
                    </div>

                </div>

            </div>

        </div>

        <!-- Attendance -->

        <div class="col-lg-6 mb-4">

            <div class="card shadow">

                <div class="card-header bg-success text-white">

                    <h5 class="mb-0">

                        Attendance Analytics

                    </h5>

                </div>

                <div class="card-body">

                    <canvas id="barChart"></canvas>

                </div>

            </div>

        </div>

        <!-- Department Analytics -->

        <div class="col-lg-12 mb-4">

            <div class="card shadow">

                <div class="card-header bg-info text-white">

                    <h5 class="mb-0">

                        Students by Department

                    </h5>

                </div>

                <div class="card-body">

                    <div style="height:300px; width:300px; margin:auto;">
                        <canvas id="departmentChart"></canvas>
                    </div>

                </div>

            </div>

        </div>
    </div>

    <!-- Footer -->

    <footer class="mt-5 text-center">

        <hr class="border-light">

        <p class="text-light mb-1">

            <strong>Smart Face Recognition Attendance System</strong>

        </p>



    </footer>

</div>

<script th:inline="javascript">

    // ===========================================
    // Live Date & Clock
    // ===========================================

    function updateClock() {

        const now = new Date();

        document.getElementById("liveClock").innerHTML =
            now.toLocaleTimeString();

        document.getElementById("liveDate").innerHTML =
            now.toDateString();

    }

    setInterval(updateClock, 1000);

    updateClock();


    // ===========================================
    // Dashboard Statistics
    // ===========================================

    const present = [[${presentToday}]];
    const absent = [[${absentToday}]];


    // ===========================================
    // Department Analytics
    // ===========================================

    const departments = [[${departments}]];
    const departmentCounts = [[${departmentCounts}]];


    // ===========================================
    // Present vs Absent Pie Chart
    // ===========================================

    new Chart(document.getElementById("pieChart"), {

        type: "pie",

        data: {

            labels: ["Present", "Absent"],

            datasets: [{

                data: [present, absent],

                backgroundColor: [

                    "#198754",

                    "#dc3545"

                ]

            }]

        },

        options: {

            responsive: true,

            maintainAspectRatio:false,

            plugins: {

                legend: {

                    position: "bottom"

                }

            }

        }

    });


    // ===========================================
    // Attendance Analytics Bar Chart
    // ===========================================

    new Chart(document.getElementById("barChart"), {

        type: "bar",

        data: {

            labels: ["Present", "Absent"],

            datasets: [{

                label: "Students",

                data: [present, absent],

                backgroundColor: [

                    "#198754",

                    "#dc3545"

                ]

            }]

        },

        options: {

            responsive: true,

            scales: {

                y: {

                    beginAtZero: true,

                    ticks: {

                        precision: 0

                    }

                }

            },

            plugins: {

                legend: {

                    display: false

                }

            }

        }

    });


    // ===========================================
    // Department-wise Pie Chart
    // ===========================================

    new Chart(document.getElementById("departmentChart"), {

        type: "pie",

        data: {

            labels: departments,

            datasets: [{

                data: departmentCounts,

                backgroundColor: [

                    "#0d6efd",

                    "#198754",

                    "#ffc107",

                    "#dc3545",

                    "#6f42c1",

                    "#20c997",

                    "#fd7e14",

                    "#6610f2"

                ]

            }]

        },

        options: {

            responsive: true,

            plugins: {

                legend: {

                    position: "bottom"

                }

            }

        }

    });

</script>
</main>

</div>
</body>

</html>
