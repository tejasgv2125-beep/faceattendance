<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Attendance Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body style="background:#0f172a; color:white;">

<div class="container-fluid py-4">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2>AI Smart Attendance Dashboard</h2>
            <p class="text-light">Welcome, Administrator</p>
        </div>

        <div>
            <a href="/students" class="btn btn-primary">
                <i class="bi bi-people-fill"></i>
                Students
            </a>

            <a href="/students/add" class="btn btn-success">
                <i class="bi bi-person-plus-fill"></i>
                Add Student
            </a>

            <a href="/logout" class="btn btn-danger">
                <i class="bi bi-box-arrow-right"></i>
                Logout
            </a>
        </div>

    </div>

    <!-- Statistics -->

    <div class="row g-4 mb-5">

        <div class="col-md-3">

            <div class="card bg-dark text-white shadow">

                <div class="card-body text-center">

                    <i class="bi bi-people-fill fs-1 text-primary"></i>

                    <h2 th:text="${totalStudents}">0</h2>

                    <h5>Total Students</h5>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-dark text-white shadow">

                <div class="card-body text-center">

                    <i class="bi bi-check-circle-fill fs-1 text-success"></i>

                    <h2 th:text="${presentToday}">0</h2>

                    <h5>Present Today</h5>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-dark text-white shadow">

                <div class="card-body text-center">

                    <i class="bi bi-x-circle-fill fs-1 text-danger"></i>

                    <h2 th:text="${absentToday}">0</h2>

                    <h5>Absent Today</h5>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-dark text-white shadow">

                <div class="card-body text-center">

                    <i class="bi bi-graph-up-arrow fs-1 text-warning"></i>

                    <h2>98%</h2>

                    <h5>Accuracy</h5>

                </div>

            </div>

        </div>

    </div>

    <!-- Quick Actions -->

    <div class="row mb-5">

        <div class="col-md-12">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h5 class="mb-0">
                        Quick Actions
                    </h5>

                </div>

                <div class="card-body">

                    <div class="d-flex flex-wrap gap-3">

                        <a href="/students/add" class="btn btn-success">
                            Add Student
                        </a>

                        <a href="/students" class="btn btn-primary">
                            View Students
                        </a>

                        <a href="#" class="btn btn-warning">
                            Live Attendance
                        </a>

                        <a href="#" class="btn btn-info">
                            Reports
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Recent Attendance -->

    <div class="card shadow">

        <div class="card-header bg-dark text-white">

            <h5 class="mb-0">
                Recent Attendance
            </h5>

        </div>

        <div class="card-body">

            <table class="table table-striped">

                <thead>

                <tr>

                    <th>USN</th>

                    <th>Name</th>

                    <th>Time</th>

                    <th>Status</th>

                </tr>

                </thead>

                <tbody>

                <tr>

                    <td colspan="4" class="text-center">

                        No Attendance Available

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
