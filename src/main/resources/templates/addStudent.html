<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Student</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Common Sidebar -->
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <!-- Page CSS -->
    <link rel="stylesheet" th:href="@{/css/addStudent.css}">

</head>

<body>

<div class="dashboard-layout">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Page Header -->

        <div class="page-header mb-4">

            <div class="d-flex justify-content-between align-items-center">

                <div>

                    <h2 class="fw-bold text-white">

                        <i class="bi bi-person-plus-fill text-primary"></i>

                        Add Student

                    </h2>

                    <p class="text-secondary mb-0">

                        Register a new student into the AI Attendance System

                    </p>

                </div>

                <a th:href="@{/students}" class="btn btn-outline-light">

                    <i class="bi bi-arrow-left"></i>

                    Back

                </a>

            </div>

        </div>

        <!-- Form -->

        <form
                th:action="@{/students/save}"
                th:object="${student}"
                method="post">

            <input type="hidden" th:field="*{id}">

            <input
                    type="hidden"
                    id="capturedImage"
                    name="capturedImage">

            <input
                    type="hidden"
                    id="faceDescriptor"
                    name="faceDescriptor">

            <div class="row g-4">

                <!-- LEFT SIDE -->

                <div class="col-lg-5">

                    <div class="card h-100 shadow">

                        <div class="card-header">

                            <h5 class="mb-0">

                                <i class="bi bi-person-vcard-fill"></i>

                                Student Information

                            </h5>

                        </div>

                        <div class="card-body">

                            <!-- Name -->

                            <div class="mb-3">

                                <label class="form-label">

                                    Student Name

                                </label>

                                <input

                                        type="text"

                                        class="form-control"

                                        th:field="*{name}"

                                        required>

                            </div>

                            <!-- USN -->

                            <div class="mb-3">

                                <label class="form-label">

                                    USN

                                </label>

                                <input

                                        type="text"

                                        class="form-control"

                                        th:field="*{usn}"

                                        required>

                            </div>

                            <!-- Department -->

                            <div class="mb-3">

                                <label class="form-label">

                                    Department

                                </label>

                                <input

                                        type="text"

                                        class="form-control"

                                        th:field="*{department}"

                                        required>

                            </div>

                            <!-- Semester -->

                            <div class="mb-3">

                                <label class="form-label">

                                    Semester

                                </label>

                                <input

                                        type="text"

                                        class="form-control"

                                        th:field="*{semester}"

                                        required>

                            </div>

                            <!-- Email -->

                            <div class="mb-3">

                                <label class="form-label">

                                    Email

                                </label>

                                <input

                                        type="email"

                                        class="form-control"

                                        th:field="*{email}"

                                        required>

                            </div>

                            <!-- Phone -->

                            <div class="mb-4">

                                <label class="form-label">

                                    Phone Number

                                </label>

                                <input

                                        type="text"

                                        class="form-control"

                                        th:field="*{phone}"

                                        required>

                            </div>
                        </div>

                    </div>

                </div>

                <!-- RIGHT SIDE -->

                <div class="col-lg-7">

                    <div class="card h-100 shadow">

                        <div class="card-header">

                            <h5 class="mb-0">

                                <i class="bi bi-camera-fill"></i>

                                Face Registration

                            </h5>

                        </div>

                        <div class="card-body">

                            <div class="row">

                                <!-- Camera -->

                                <div class="col-md-8">

                                    <video

                                            id="video"

                                            autoplay

                                            playsinline

                                            class="camera-preview w-100">

                                    </video>

                                    <canvas

                                            id="canvas"

                                            width="640"

                                            height="480"

                                            style="display:none;">

                                    </canvas>

                                </div>

                                <!-- Preview -->

                                <div class="col-md-4">

                                    <div class="preview-card">

                                        <img

                                                id="preview"

                                                src="https://via.placeholder.com/220x260?text=Student+Photo"

                                                class="img-fluid"

                                                style="display:block;">

                                        <h6 class="mt-3">

                                            Captured Photo

                                        </h6>

                                        <span

                                                id="cameraStatus"

                                                class="badge bg-secondary">

                                            Waiting for Camera...

                                        </span>

                                    </div>

                                </div>

                            </div>

                            <!-- Buttons -->

                            <div class="text-center mt-4">

                                <button

                                        type="button"

                                        id="captureBtn"

                                        class="btn btn-primary btn-lg me-3">

                                    <i class="bi bi-camera-fill"></i>

                                    Capture Face

                                </button>

                                <button

                                        type="button"

                                        id="retakeBtn"

                                        class="btn btn-warning btn-lg">

                                    <i class="bi bi-arrow-repeat"></i>

                                    Retake

                                </button>

                            </div>

                            <div class="alert alert-info mt-4 mb-0">

                                <i class="bi bi-info-circle-fill"></i>

                                Please look directly into the camera while capturing the student's face. Ensure good lighting and avoid multiple faces in the frame.

                            </div>

                        </div>

                    </div>

                </div>

            </div>
            <!-- Bottom Buttons -->

            <div class="d-flex justify-content-between align-items-center mt-4">

                <a th:href="@{/students}"
                   class="btn btn-outline-light btn-lg">

                    <i class="bi bi-arrow-left-circle"></i>

                    Back to Students

                </a>

                <button
                        type="submit"
                        class="btn btn-success btn-lg px-5">

                    <i class="bi bi-check-circle-fill"></i>

                    Save Student

                </button>

            </div>

        </form>

    </main>

</div>

<!-- Face API -->
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<!-- Student Capture -->
<script defer th:src="@{/js/studentCapture.js}"></script>

</body>

</html>
