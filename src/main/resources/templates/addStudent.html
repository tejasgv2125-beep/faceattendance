<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card shadow-lg border-0">

                <div class="card-header bg-primary text-white">

                    <h3 class="mb-0">

                        <i class="bi bi-person-plus-fill"></i>

                        Add Student

                    </h3>

                </div>

                <div class="card-body">

                    <form th:action="@{/students/save}"
                          th:object="${student}"
                          method="post">

                        <input type="hidden" th:field="*{id}">

                        <!-- Hidden field for captured image -->
                        <input type="hidden"
                               id="capturedImage"
                               name="capturedImage">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">Student Name</label>

                                <input
                                        type="text"
                                        class="form-control"
                                        th:field="*{name}"
                                        required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">USN</label>

                                <input
                                        type="text"
                                        class="form-control"
                                        th:field="*{usn}"
                                        required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">Department</label>

                                <input
                                        type="text"
                                        class="form-control"
                                        th:field="*{department}"
                                        required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">Semester</label>

                                <input
                                        type="text"
                                        class="form-control"
                                        th:field="*{semester}"
                                        required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">Email</label>

                                <input
                                        type="email"
                                        class="form-control"
                                        th:field="*{email}"
                                        required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">Phone Number</label>

                                <input
                                        type="text"
                                        class="form-control"
                                        th:field="*{phone}"
                                        required>

                            </div>

                        </div>

                        <hr>

                        <h4 class="mb-4">

                            <i class="bi bi-camera-fill"></i>

                            Capture Student Photo

                        </h4>

                        <div class="row">

                            <!-- Live Camera -->

                            <div class="col-md-7">

                                <video
                                        id="video"
                                        autoplay
                                        playsinline
                                        class="border rounded shadow w-100"
                                        style="height:400px;object-fit:cover;">
                                </video>

                            </div>

                            <!-- Preview -->

                            <div class="col-md-5 text-center">

                                <img
                                        id="preview"
                                        class="img-fluid rounded shadow"
                                        style="display:none;height:300px;">

                                <canvas
                                        id="canvas"
                                        width="640"
                                        height="480"
                                        style="display:none;">
                                </canvas>

                                <br><br>

                                <button
                                        type="button"
                                        id="captureBtn"
                                        class="btn btn-primary">

                                    <i class="bi bi-camera-fill"></i>

                                    Capture Photo

                                </button>

                                <button
                                        type="button"
                                        id="retakeBtn"
                                        class="btn btn-warning ms-2">

                                    <i class="bi bi-arrow-repeat"></i>

                                    Retake

                                </button>

                                <div class="mt-3">

                                    <span
                                            id="cameraStatus"
                                            class="badge bg-secondary">

                                        Waiting for Camera...

                                    </span>

                                </div>

                            </div>

                        </div>

                        <hr>

                        <div class="d-flex justify-content-between">

                            <a th:href="@{/students}"
                               class="btn btn-secondary">

                                <i class="bi bi-arrow-left"></i>

                                Back

                            </a>

                            <button
                                    type="submit"
                                    class="btn btn-success">

                                <i class="bi bi-check-circle-fill"></i>

                                Save Student

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script th:src="@{/js/studentCapture.js}"></script>

</body>

</html>
