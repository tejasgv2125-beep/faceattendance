<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Attendance Reports</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
</head>

<body class="bg-light">

<div class="container-fluid py-4">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold text-primary">

                <i class="bi bi-file-earmark-bar-graph-fill"></i>

                Attendance Reports

            </h2>

            <p class="text-muted">

                View, Filter and Export Attendance Records

            </p>

        </div>

        <div class="d-flex gap-2">

            <a href="/dashboard"
               class="btn btn-secondary">

                <i class="bi bi-speedometer2"></i>

                Dashboard

            </a>

            <a href="/attendance/history"
               class="btn btn-primary">

                <i class="bi bi-clock-history"></i>

                Attendance History

            </a>

        </div>

    </div>

    <!-- Filter Card -->

    <div class="card shadow-sm mb-4">

        <div class="card-header bg-dark text-white">

            <h5 class="mb-0">

                Filter Reports

            </h5>

        </div>

        <div class="card-body">

            <form method="get"
                  action="/reports">

                <div class="row g-3">

                    <div class="col-md-3">

                        <label class="form-label">

                            Date

                        </label>

                        <input
                                type="date"
                                name="date"
                                class="form-control"
                                th:value="${selectedDate}">

                    </div>

                    <div class="col-md-3">

                        <label class="form-label">

                            Department

                        </label>

                        <select
                                name="department"
                                class="form-select">

                            <option value="All">All</option>
                            <option value="ISE">ISE</option>
                            <option value="CSE">CSE</option>
                            <option value="ECE">ECE</option>
                            <option value="EEE">EEE</option>
                            <option value="ME">ME</option>
                            <option value="CV">CV</option>

                        </select>

                    </div>

                    <div class="col-md-3">

                        <label class="form-label">

                            Status

                        </label>

                        <select
                                name="status"
                                class="form-select">

                            <option value="All">All</option>
                            <option value="Present">Present</option>

                        </select>

                    </div>

                    <div class="col-md-3 d-flex align-items-end">

                        <button
                                type="submit"
                                class="btn btn-primary me-2">

                            <i class="bi bi-funnel-fill"></i>

                            Filter

                        </button>

                        <a href="/reports"
                           class="btn btn-secondary">

                            Reset

                        </a>

                    </div>

                </div>

            </form>

        </div>

    </div>

    <!-- Search -->

    <div class="card shadow-sm mb-4">

        <div class="card-body">

            <input
                    type="text"
                    id="searchInput"
                    class="form-control"
                    placeholder="Search by Name, USN, Department...">

        </div>

    </div>

    <!-- Export Buttons -->

    <div class="mb-3">

        <a href="/attendance/export/csv"
           class="btn btn-success">

            <i class="bi bi-filetype-csv"></i>

            Export CSV

        </a>

        <a href="/attendance/export/excel"
           class="btn btn-warning">

            <i class="bi bi-file-earmark-excel-fill"></i>

            Export Excel

        </a>

        <a href="/attendance/export/pdf"
           class="btn btn-danger">

            <i class="bi bi-file-earmark-pdf-fill"></i>

            Export PDF

        </a>

    </div>

    <!-- Attendance Table -->

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h5 class="mb-0">

                Attendance Report

            </h5>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table
                        class="table table-hover table-bordered align-middle"
                        id="reportTable">

                    <thead class="table-dark">

                    <tr>

                        <th>#</th>
                        <th>Name</th>
                        <th>USN</th>
                        <th>Department</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:if="${#lists.isEmpty(attendanceList)}">

                        <td colspan="7"
                            class="text-center">

                            No Attendance Records Found

                        </td>

                    </tr>

                    <tr th:each="attendance, stat : ${attendanceList}">

                        <td th:text="${stat.count}"></td>

                        <td th:text="${attendance.student.name}"></td>

                        <td th:text="${attendance.student.usn}"></td>

                        <td th:text="${attendance.student.department}"></td>

                        <td th:text="${attendance.attendanceDate}"></td>

                        <td th:text="${attendance.attendanceTime}"></td>

                        <td>

                            <span class="badge bg-success"
                                  th:text="${attendance.status}">
                            </span>

                        </td>

                    </tr>
                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>

    document.getElementById("searchInput").addEventListener("keyup", function () {

        let value = this.value.toLowerCase();

        document.querySelectorAll("#reportTable tbody tr").forEach(function(row){

            row.style.display =
                row.innerText.toLowerCase().includes(value)
                    ? ""
                    : "none";

        });

    });

</script>

</body>

</html>
