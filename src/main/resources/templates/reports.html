<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Attendance Reports</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Sidebar -->
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <!-- Reports CSS -->
    <link rel="stylesheet" th:href="@{/css/reports.css}">

</head>

<body>

<div class="dashboard-layout">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Main Content -->
    <main class="main-content">

        <!-- ================= Header ================= -->

        <div class="page-header mb-4">

            <div>

                <h2>

                    <i class="bi bi-bar-chart-fill text-primary"></i>

                    Attendance Reports

                </h2>

                <p>

                    Analyze, Filter and Export Attendance Reports

                </p>

            </div>

        </div>

        <!-- ================= Statistics ================= -->

        <div class="row g-4 mb-4">

            <div class="col-lg-4">

                <div class="stat-card blue">

                    <div>

                        <small>Total Reports</small>

                        <h2 th:text="${totalReports}">0</h2>

                    </div>

                    <i class="bi bi-file-earmark-bar-graph-fill"></i>

                </div>

            </div>

            <div class="col-lg-4">

                <div class="stat-card green">

                    <div>

                        <small>Registered Students</small>

                        <h2 th:text="${totalStudents}">0</h2>

                    </div>

                    <i class="bi bi-people-fill"></i>

                </div>

            </div>

            <div class="col-lg-4">

                <div class="stat-card orange">

                    <div>

                        <small>Latest Attendance</small>

                        <h5 th:text="${latestAttendance}"></h5>

                    </div>

                    <i class="bi bi-calendar-check-fill"></i>

                </div>

            </div>

        </div>

        <!-- ================= Filter ================= -->

        <div class="card filter-card mb-4">

            <div class="card-body">

                <form method="get" action="/reports">

                    <div class="row g-3">

                        <div class="col-lg-3">

                            <label class="form-label">

                                Date

                            </label>

                            <input
                                    type="date"
                                    name="date"
                                    class="form-control"
                                    th:value="${selectedDate}">

                        </div>

                        <div class="col-lg-3">

                            <label class="form-label">

                                Department

                            </label>

                            <select
                                    name="department"
                                    class="form-select">

                                <option value="All">All</option>
                                <option value="ISE">ISE</option>
                                <option value="CSE">CSE</option>
                                <option value="ECE">ECE</option>
                                <option value="EEE">EEE</option>
                                <option value="ME">ME</option>
                                <option value="CV">CV</option>

                            </select>

                        </div>

                        <div class="col-lg-2">

                            <label class="form-label">

                                Status

                            </label>

                            <select
                                    name="status"
                                    class="form-select">

                                <option value="All">All</option>
                                <option value="Present">Present</option>

                            </select>

                        </div>

                        <div class="col-lg-2 d-flex align-items-end">

                            <button
                                    class="btn btn-primary w-100">

                                <i class="bi bi-funnel-fill"></i>

                                Filter

                            </button>

                        </div>

                        <div class="col-lg-2 d-flex align-items-end">

                            <a href="/reports"
                               class="btn btn-secondary w-100">

                                Reset

                            </a>

                        </div>

                    </div>

                </form>

            </div>

        </div>

        <!-- ================= Search + Export ================= -->

        <div class="card mb-4">

            <div class="card-body">

                <div class="row g-3 align-items-center">

                    <div class="col-lg-5">

                        <div class="input-group">

                            <span class="input-group-text">

                                <i class="bi bi-search"></i>

                            </span>

                            <input
                                    type="text"
                                    id="searchInput"
                                    class="form-control"
                                    placeholder="Search Student">

                        </div>

                    </div>

                    <div class="col-lg-7 text-end">

                        <a href="/attendance/export/csv"
                           class="btn btn-success">

                            CSV

                        </a>

                        <a href="/attendance/export/excel"
                           class="btn btn-warning">

                            Excel

                        </a>

                        <a href="/attendance/export/pdf"
                           class="btn btn-danger">

                            PDF

                        </a>

                    </div>

                </div>

            </div>

        </div>

        <!-- ================= Table ================= -->

        <div class="card table-card">

            <div class="card-header">

                <h5>

                    <i class="bi bi-table"></i>

                    Attendance Report

                </h5>

            </div>

            <div class="card-body">

                <div class="table-responsive">

                    <table
                            id="reportTable"
                            class="table align-middle">

                        <thead>

                        <tr>

                            <th>Student</th>

                            <th>USN</th>

                            <th>Department</th>

                            <th>Date</th>

                            <th>Time</th>

                            <th>Status</th>

                        </tr>

                        </thead>

                        <tbody>
                        <!-- No Records -->

                        <tr th:if="${#lists.isEmpty(attendanceList)}">

                            <td colspan="6" class="text-center py-5">

                                <div class="empty-state">

                                    <i class="bi bi-file-earmark-x"></i>

                                    <h4>No Reports Found</h4>

                                    <p class="text-muted">

                                        No attendance records match the selected filters.

                                    </p>

                                </div>

                            </td>

                        </tr>

                        <!-- Attendance Records -->

                        <tr th:each="attendance : ${attendanceList}">

                            <td>

                                <div class="student-info">

                                    <div class="student-avatar">

                                        <i class="bi bi-person-fill"></i>

                                    </div>

                                    <div>

                                        <div class="student-name"
                                             th:text="${attendance.student.name}"></div>

                                    </div>

                                </div>

                            </td>

                            <td th:text="${attendance.student.usn}"></td>

                            <td>

                                <span class="badge bg-info"
                                      th:text="${attendance.student.department}">
                                </span>

                            </td>

                            <td th:text="${attendance.attendanceDate}"></td>

                            <td th:text="${attendance.attendanceTime}"></td>

                            <td>

                                <span class="status-present"
                                      th:text="${attendance.status}">
                                </span>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </main>

</div>

<script>

    const searchInput = document.getElementById("searchInput");

    searchInput.addEventListener("keyup", function(){

        let value = this.value.toLowerCase();

        document.querySelectorAll("#reportTable tbody tr").forEach(row=>{

            row.style.display =
                row.innerText.toLowerCase().includes(value)
                    ? ""
                    : "none";

        });

    });

</script>

</body>

</html>
