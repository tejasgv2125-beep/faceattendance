<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-4">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold text-primary">

                <i class="bi bi-person-circle"></i>

                Student Profile

            </h2>

        </div>

        <div>

            <a href="/students"
               class="btn btn-secondary">

                <i class="bi bi-arrow-left"></i>

                Students

            </a>

            <a href="/dashboard"
               class="btn btn-primary">

                <i class="bi bi-speedometer2"></i>

                Dashboard

            </a>

        </div>

    </div>

    <!-- Student Information -->

    <div class="card shadow mb-4">

        <div class="card-body">

            <div class="row">

                <div class="col-md-3 text-center">

                    <img th:src="@{${student.photoPath}}"
                         class="rounded-circle border shadow"
                         width="180"
                         height="180">

                </div>

                <div class="col-md-9">

                    <h2 th:text="${student.name}"></h2>

                    <hr>

                    <div class="row">

                        <div class="col-md-6">

                            <p>
                                <strong>USN :</strong>

                                <span th:text="${student.usn}"></span>
                            </p>

                            <p>
                                <strong>Department :</strong>

                                <span th:text="${student.department}"></span>
                            </p>

                            <p>
                                <strong>Semester :</strong>

                                <span th:text="${student.semester}"></span>
                            </p>

                        </div>

                        <div class="col-md-6">

                            <p>
                                <strong>Email :</strong>

                                <span th:text="${student.email}"></span>
                            </p>

                            <p>
                                <strong>Phone :</strong>

                                <span th:text="${student.phone}"></span>
                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Attendance Summary -->

    <div class="row mb-4">

        <div class="col-md-4">

            <div class="card shadow border-success">

                <div class="card-body text-center">

                    <h5>Present Days</h5>

                    <h2 class="text-success"
                        th:text="${presentDays}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow border-danger">

                <div class="card-body text-center">

                    <h5>Absent Days</h5>

                    <h2 class="text-danger"
                        th:text="${absentDays}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow border-primary">

                <div class="card-body text-center">

                    <h5>Attendance %</h5>

                    <h2 class="text-primary">

                        <span th:text="${attendancePercentage}"></span>%

                    </h2>

                </div>

            </div>

        </div>

    </div>

    <!-- Attendance History -->

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h5 class="mb-0">

                Attendance History

            </h5>

        </div>

        <div class="card-body">

            <table class="table table-striped table-hover">

                <thead class="table-dark">

                <tr>

                    <th>#</th>

                    <th>Date</th>

                    <th>Time</th>

                    <th>Status</th>

                </tr>

                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(attendanceHistory)}">

                    <td colspan="4"
                        class="text-center">

                        No Attendance Found

                    </td>

                </tr>

                <tr th:each="attendance, stat : ${attendanceHistory}">

                    <td th:text="${stat.count}"></td>

                    <td th:text="${attendance.attendanceDate}"></td>

                    <td th:text="${attendance.attendanceTime}"></td>

                    <td>

                        <span class="badge bg-success"
                              th:text="${attendance.status}">
                        </span>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
