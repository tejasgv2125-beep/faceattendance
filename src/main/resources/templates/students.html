<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container-fluid py-4">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold">
                <i class="bi bi-people-fill text-primary"></i>
                Student Management
            </h2>

            <p class="text-muted">
                Manage all registered students
            </p>

        </div>

        <div>

            <a th:href="@{/dashboard}" class="btn btn-secondary">

                <i class="bi bi-speedometer2"></i>

                Dashboard

            </a>

            <a th:href="@{/students/add}" class="btn btn-primary">

                <i class="bi bi-person-plus-fill"></i>

                Add Student

            </a>

        </div>

    </div>

    <!-- Search -->

    <div class="card shadow-sm mb-4">

        <div class="card-body">

            <input
                    type="text"
                    id="searchInput"
                    class="form-control"
                    placeholder="Search by Name or USN...">

        </div>

    </div>

    <!-- Student Table -->

    <div class="card shadow">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle" id="studentTable">

                    <thead class="table-dark">

                    <tr>

                        <th>ID</th>
                        <th>Name</th>
                        <th>USN</th>
                        <th>Department</th>
                        <th>Semester</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Actions</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:if="${#lists.isEmpty(students)}">

                        <td colspan="8" class="text-center text-muted">

                            No students found.

                        </td>

                    </tr>

                    <tr th:each="student : ${students}">

                        <td th:text="${student.id}"></td>

                        <td th:text="${student.name}"></td>

                        <td th:text="${student.usn}"></td>

                        <td th:text="${student.department}"></td>

                        <td th:text="${student.semester}"></td>

                        <td th:text="${student.email}"></td>

                        <td th:text="${student.phone}"></td>

                        <td>

                            <a th:href="@{/students/edit/{id}(id=${student.id})}"
                               class="btn btn-warning btn-sm">

                                <i class="bi bi-pencil-fill"></i>

                            </a>

                            <a th:href="@{/students/delete/{id}(id=${student.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this student?');">

                                <i class="bi bi-trash-fill"></i>

                            </a>

                            <button class="btn btn-info btn-sm">

                                <i class="bi bi-camera-fill"></i>

                            </button>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<!-- Search Script -->

<script>

    const searchInput = document.getElementById("searchInput");

    searchInput.addEventListener("keyup", function () {

        let filter = this.value.toLowerCase();

        let rows = document.querySelectorAll("#studentTable tbody tr");

        rows.forEach(row => {

            let text = row.innerText.toLowerCase();

            row.style.display = text.includes(filter) ? "" : "none";

        });

    });

</script>

</body>

</html>
