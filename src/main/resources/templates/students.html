<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container-fluid py-4">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold">
                <i class="bi bi-people-fill text-primary"></i>
                Student Management
            </h2>

            <p class="text-muted">
                Manage all registered students
            </p>

        </div>

        <div>

            <a th:href="@{/dashboard}" class="btn btn-secondary me-2">
                <i class="bi bi-speedometer2"></i>
                Dashboard
            </a>

            <a th:href="@{/students/add}" class="btn btn-primary">
                <i class="bi bi-person-plus-fill"></i>
                Add Student
            </a>

        </div>

    </div>

    <!-- Statistics -->

    <div class="row mb-4">

        <div class="col-md-4">

            <div class="card border-0 shadow">

                <div class="card-body text-center">

                    <i class="bi bi-people-fill fs-1 text-primary"></i>

                    <h2 th:text="${totalStudents}">0</h2>

                    <p>Total Students</p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card border-0 shadow">

                <div class="card-body text-center">

                    <i class="bi bi-person-check-fill fs-1 text-success"></i>

                    <h2 th:text="${faceRegistered}">0</h2>

                    <p>Face Registered</p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card border-0 shadow">

                <div class="card-body text-center">

                    <i class="bi bi-person-x-fill fs-1 text-danger"></i>

                    <h2 th:text="${pendingRegistration}">0</h2>

                    <p>Pending Registration</p>

                </div>

            </div>

        </div>

    </div>

    <!-- Search -->

    <div class="card shadow-sm mb-4">

        <div class="card-body">

            <input
                    type="text"
                    id="searchInput"
                    class="form-control"
                    placeholder="Search Student...">

        </div>

    </div>

    <!-- Table -->

    <div class="card shadow">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle" id="studentTable">

                    <thead class="table-dark">

                    <tr>

                        <th>Photo</th>
                        <th>Name</th>
                        <th>USN</th>
                        <th>Department</th>
                        <th>Semester</th>
                        <th>Face Status</th>
                        <th>Actions</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:if="${#lists.isEmpty(students)}">

                        <td colspan="7" class="text-center">

                            No Students Found

                        </td>

                    </tr>

                    <tr th:each="student : ${students}">

                        <!-- Photo -->

                        <td>

                            <img th:if="${student.photoPath != null}"
                                 th:src="@{${student.photoPath}}"
                                 width="60"
                                 height="60"
                                 class="rounded-circle border">

                            <img th:if="${student.photoPath == null}"
                                 src="https://via.placeholder.com/60"
                                 class="rounded-circle border">

                        </td>

                        <!-- Details -->

                        <td th:text="${student.name}"></td>

                        <td th:text="${student.usn}"></td>

                        <td th:text="${student.department}"></td>

                        <td th:text="${student.semester}"></td>

                        <!-- Face Status -->

                        <td>

                            <span
                                    th:if="${student.faceDescriptor != null}"
                                    class="badge bg-success">

                                Registered

                            </span>

                            <span
                                    th:if="${student.faceDescriptor == null}"
                                    class="badge bg-danger">

                                Pending

                            </span>

                        </td>

                        <!-- Actions -->

                        <td>

                            <a th:href="@{/students/edit/{id}(id=${student.id})}"
                               class="btn btn-warning btn-sm">

                                <i class="bi bi-pencil-fill"></i>

                            </a>

                            <a th:href="@{/students/delete/{id}(id=${student.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this student?')">

                                <i class="bi bi-trash-fill"></i>

                            </a>

                            <a th:href="@{/students/register-face/{id}(id=${student.id})}"
                               class="btn btn-primary btn-sm">

                                <i class="bi bi-person-bounding-box"></i>

                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>

    const searchInput = document.getElementById("searchInput");

    searchInput.addEventListener("keyup", function () {

        let value = this.value.toLowerCase();

        document.querySelectorAll("#studentTable tbody tr").forEach(row => {

            row.style.display =
                row.innerText.toLowerCase().includes(value)
                    ? ""
                    : "none";

        });

    });

</script>

</body>

</html>
