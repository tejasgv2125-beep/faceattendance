<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Management</title>
    <link rel="stylesheet" th:href="@{/css/students.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>

<div class="dashboard-layout">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="main-content">

<div class="container-fluid py-4">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold text-primary">
                <i class="bi bi-people-fill"></i>
                Student Management
            </h2>

            <p class="text-muted mb-0">
                Manage all registered students
            </p>

        </div>

        <div>



            <a th:href="@{/students/add}" class="btn btn-primary">
                <i class="bi bi-person-plus-fill"></i>
                Add Student
            </a>

        </div>

    </div>

    <!-- Statistics -->

    <div class="row g-4 mb-4">

        <div class="col-md-4">

            <div class="card stat-card students-card">
                <div class="card-body text-center">

                    <div class="icon-circle bg-primary">
                        <i class="bi bi-people-fill"></i>
                    </div>                    <h2 th:text="${totalStudents}"></h2>

                    <p>Total Students</p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card stat-card registered-card">
                <div class="card-body text-center">

                    <div class="icon-circle bg-success">
                        <i class="bi bi-person-check-fill"></i>
                    </div>
                    <h2 th:text="${faceRegistered}"></h2>

                    <p>Face Registered</p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card stat-card pending-card">
                <div class="card-body text-center">

                    <div class="icon-circle bg-danger">
                        <i class="bi bi-person-x-fill"></i>
                    </div>
                    <h2 th:text="${pendingRegistration}"></h2>

                    <p>Pending Registration</p>

                </div>

            </div>

        </div>

    </div>

    <!-- Search -->

    <div class="card shadow-sm mb-4">

        <div class="card-body">

            <div class="search-box">

                <i class="bi bi-search"></i>

                <input
                        type="text"
                        id="searchInput"
                        class="form-control"
                        placeholder="Search by Name, USN, Department...">

            </div>

        </div>

    </div>

    <!-- Student Table -->

    <div class="card student-table-card shadow-lg border-0">
        <div class="card-body">

            <div class="table-responsive">

                <table class="table align-middle mb-0 student-table"
                       id="studentTable">

                    <thead class="student-table-head">

                    <tr>

                        <th>#</th>
                        <th>Photo</th>
                        <th>Name</th>
                        <th>USN</th>
                        <th>Department</th>
                        <th>Semester</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Actions</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:if="${#lists.isEmpty(students)}">

                        <td colspan="10"
                            class="text-center text-muted">

                            No Students Found

                        </td>

                    </tr>

                    <tr th:each="student, stat : ${students}">

                        <td th:text="${stat.count}"></td>

                        <td class="text-center">

                            <img th:if="${student.photoPath != null}"
                                 th:src="@{${student.photoPath}}"
                                 width="60"
                                 height="60"
                                 class="student-photo">

                            <img th:if="${student.photoPath == null}"
                                 src="https://via.placeholder.com/60"
                                 class="rounded-circle">

                        </td>

                        <td th:text="${student.name}"></td>

                        <td th:text="${student.usn}"></td>

                        <td th:text="${student.department}"></td>

                        <td th:text="${student.semester}"></td>

                        <td th:text="${student.email}"></td>

                        <td th:text="${student.phone}"></td>

                        <td>

                            <span th:if="${student.faceDescriptor != null && !student.faceDescriptor.isEmpty()}"
                                  class="badge status-registered"
                                Registered

                            </span>

                            <span th:if="${student.faceDescriptor == null || student.faceDescriptor.isEmpty()}"
                                  class="badge status-pending"
                                Pending

                            </span>

                        </td>

                        <td>

                            <a th:href="@{/students/profile/{id}(id=${student.id})}"
                               class="btn btn-primary action-btn"
                               title="View Profile">

                                <i class="bi bi-eye-fill"></i>

                            </a>

                            <a th:href="@{/students/edit/{id}(id=${student.id})}"
                               class="btn btn-warning action-btn"
                               title="Edit Student">

                                <i class="bi bi-pencil-fill"></i>

                            </a>

                            <a th:href="@{/students/delete/{id}(id=${student.id})}"
                               class="btn btn-danger action-btn"
                               title="Delete Student"
                               onclick="return confirm('Delete this student?')">

                                <i class="bi bi-trash-fill"></i>

                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>

    document.getElementById("searchInput").addEventListener("keyup", function () {

        let value = this.value.toLowerCase();

        document.querySelectorAll("#studentTable tbody tr").forEach(row => {

            row.style.display =
                row.innerText.toLowerCase().includes(value)
                    ? ""
                    : "none";

        });

    });

</script>
    </main>

</div>
</body>

</html>
