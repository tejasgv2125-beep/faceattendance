<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Face Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card shadow-lg border-0">

                <div class="card-header bg-primary text-white">

                    <div class="d-flex justify-content-between align-items-center">

                        <h3 class="mb-0">

                            <i class="bi bi-person-bounding-box"></i>

                            Face Registration

                        </h3>

                        <a th:href="@{/students}" class="btn btn-light btn-sm">

                            <i class="bi bi-arrow-left"></i>

                            Back

                        </a>

                    </div>

                </div>

                <div class="card-body">

                    <!-- Hidden Student ID -->

                    <input type="hidden"
                           id="studentId"
                           th:value="${student.id}">

                    <div class="row">

                        <!-- Student Details -->

                        <div class="col-md-4">

                            <div class="card">

                                <div class="card-body text-center">

                                    <img th:if="${student.photoPath != null}"
                                         th:src="@{${student.photoPath}}"
                                         class="rounded-circle mb-3"
                                         width="140"
                                         height="140">

                                    <img th:if="${student.photoPath == null}"
                                         src="https://via.placeholder.com/140"
                                         class="rounded-circle mb-3">

                                    <h4 th:text="${student.name}"></h4>

                                    <p class="text-muted">

                                        <strong>USN:</strong>

                                        <span th:text="${student.usn}"></span>

                                    </p>

                                    <p>

                                        <strong>Department:</strong>

                                        <span th:text="${student.department}"></span>

                                    </p>

                                    <p>

                                        <strong>Semester:</strong>

                                        <span th:text="${student.semester}"></span>

                                    </p>

                                </div>

                            </div>

                        </div>

                        <!-- Camera -->

                        <div class="col-md-8">

                            <video
                                    id="video"
                                    autoplay
                                    playsinline
                                    class="w-100 border rounded shadow"
                                    style="height:450px;object-fit:cover;">
                            </video>

                            <canvas
                                    id="canvas"
                                    width="640"
                                    height="480"
                                    style="display:none;">
                            </canvas>

                            <div class="mt-3 d-flex gap-2">

                                <button
                                        type="button"
                                        id="captureBtn"
                                        class="btn btn-success">

                                    <i class="bi bi-camera-fill"></i>

                                    Register Face

                                </button>

                                <button
                                        type="button"
                                        id="retakeBtn"
                                        class="btn btn-warning">

                                    <i class="bi bi-arrow-repeat"></i>

                                    Retry

                                </button>

                            </div>

                            <div
                                    id="status"
                                    class="alert alert-info mt-3">

                                Initializing AI...

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<script th:src="@{/js/faceRegistration.js}"></script>
</body>

</html>
